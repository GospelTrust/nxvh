w-1:
  title: 'Đức Chúa Jêsus bị bắt và bị xét hỏi'
  scripture: '18:1–27'
  summary: 'Đức Chúa Jêsus tự nộp mình cho quân lính tại vườn Ghết-sê-ma-nê và ngăn Phi-e-rơ dùng gươm. Ngài bị giải đến trước mặt An-ne và Cai-phe để thẩm vấn. Trong khi đó, Phi-e-rơ chối Ngài ba lần trước khi gà gáy.'

w-2:
  title: 'Đức Chúa Jêsus trước mặt Phi-lát'
  scripture: '18:28–19:16'
  summary: 'Phi-lát xét hỏi Đức Chúa Jêsus về vương quốc của Ngài nhưng không tìm thấy lỗi gì. Dân chúng đòi tha Ba-ra-ba và đóng đinh Đức Chúa Jêsus thay vì vua của họ. Cuối cùng, Phi-lát phó Ngài cho chúng để đem đi đóng đinh.'

w-3:
  title: 'Sự đóng đinh và chôn cất'
  scripture: '19:17–42'
  summary: 'Đức Chúa Jêsus bị đóng đinh trên thập tự giá tại đồi Gô-gô-tha giữa hai người khác. Ngài phó thác mẹ mình cho môn đồ yêu dấu và tuyên bố mọi sự đã trọn trước khi trút linh hồn. Giô-sép ở A-ri-ma-thê và Ni-cô-đem tẩm liệm xác Ngài rồi đặt trong một huyệt mới.'

w-4:
  title: 'Sự phục sinh và hiện ra cho Ma-ri'
  scripture: '20:1–18'
  summary: 'Ma-ri Ma-đa-lên thấy mộ trống và báo cho Phi-e-rơ cùng môn đồ khác đến kiểm chứng. Sau khi họ về, Đức Chúa Jêsus hiện ra gọi tên Ma-ri bên ngoài mộ. Ngài bảo bà đi báo cho anh em Ngài rằng Ngài đang lên cùng Cha.'

w-5:
  title: 'Hiện ra cho các môn đồ và Thô-ma'
  scripture: '20:19–31'
  summary: 'Đức Chúa Jêsus hiện ra giữa các môn đồ đang đóng cửa kín, ban bình an và hơi Thánh Linh cho họ. Thô-ma không tin cho đến khi Ngài hiện ra lần nữa và bảo ông chạm vào các vết thương. Ngài phán phước cho những kẻ không thấy mà tin.'

w-6:
  title: 'Đánh lưới tại biển Ti-bê-ri-át'
  scripture: '21:1–14'
  summary: 'Bảy môn đồ đi đánh cá suốt đêm không được gì cho đến khi làm theo lời một người trên bờ và bắt được 153 con cá lớn. Họ nhận ra đó là Đức Chúa Jêsus và cùng ăn bữa sáng do Ngài chuẩn bị trên bờ biển. Đây là lần thứ ba Ngài hiện ra cho các môn đồ sau khi sống lại.'

w-7:
  title: 'Sự phục chức cho Phi-e-rơ'
  scripture: '21:15–25'
  summary: 'Đức Chúa Jêsus hỏi Phi-e-rơ ba lần về lòng yêu mến Ngài và giao cho ông chăn dắt chiên con cùng chiên Ngài. Ngài tiên tri về cái chết của Phi-e-rơ và bảo ông hãy theo Ngài. Sứ đồ Giăng xác nhận những việc này là chân thật và thế gian không thể chứa hết những việc Ngài làm.'

w-8:
  title: 'Đức Chúa Jêsus rửa chân cho môn đồ'
  scripture: '13:1–17'
  summary: 'Trong bữa ăn tối, Đức Chúa Jêsus đứng dậy cởi áo ngoài, quấn khăn và bắt đầu rửa chân cho các môn đồ. Ngài giải thích cho Phi-e-rơ rằng đây là việc cần thiết để có phần với Ngài. Ngài bảo các môn đồ phải làm gương theo Ngài mà rửa chân cho nhau.'

w-9:
  title: 'Sự phản bội và điều răn mới'
  scripture: '13:18–38'
  summary: 'Đức Chúa Jêsus chỉ ra Giu-đa Ích-ca-ri-ốt là kẻ phản nghịch bằng cách trao miếng bánh cho hắn. Sau khi Giu-đa đi, Ngài ban điều răn mới bảo các môn đồ phải yêu nhau như Ngài đã yêu họ. Ngài cũng tiên tri rằng Phi-e-rơ sẽ chối Ngài ba lần.'

w-10:
  title: 'Đường đi, lẽ thật và sự sống'
  scripture: '14:1–14'
  summary: 'Đức Chúa Jêsus khuyên các môn đồ đừng bối rối và hứa đi sắm sẵn một chỗ cho họ trong nhà Cha. Ngài khẳng định mình là đường đi, lẽ thật và sự sống, ai thấy Ngài là đã thấy Cha. Ngài hứa rằng ai nhân danh Ngài mà cầu xin điều gì, Ngài sẽ làm cho.'

w-11:
  title: 'Lời hứa về Đấng Yên ủi'
  scripture: '14:15–31'
  summary: 'Đức Chúa Jêsus hứa sẽ cầu xin Cha ban cho các môn đồ một Đấng Yên ủi khác là Thần Lẽ Thật để ở với họ đời đời. Ngài ban bình an của mình cho họ và dặn đừng sợ hãi dù Ngài sắp đi. Ngài khẳng định tình yêu của mình đối với Cha qua sự vâng lời.'

w-12:
  title: 'Gốc nho và nhánh'
  scripture: '15:1–11'
  summary: 'Đức Chúa Jêsus ví Ngài là gốc nho thật và Cha Ngài là người trồng nho. Ngài dạy môn đồ phải cứ ở trong Ngài như nhánh nho dính vào gốc thì mới kết quả được. Sự ở trong tình yêu của Ngài giúp họ có được sự vui mừng trọn vẹn.'

w-13:
  title: 'Tình bạn và sự bắt bớ'
  scripture: '15:12–27'
  summary: 'Đức Chúa Jêsus dạy các môn đồ yêu thương nhau như Ngài đã yêu họ, đến nỗi phó sự sống vì bạn hữu. Ngài cảnh báo thế gian sẽ ghét và bắt bớ họ vì họ thuộc về Ngài chứ không thuộc về thế gian. Ngài hứa Đấng Yên ủi sẽ đến để làm chứng về Ngài.'

w-14:
  title: 'Công việc của Thánh Linh'
  scripture: '16:1–15'
  summary: 'Đức Chúa Jêsus nói rằng Ngài đi là ích lợi vì Đấng Yên ủi sẽ đến để cáo trách thế gian về tội lỗi, sự công bình và sự phán xét. Thánh Linh sẽ dẫn các môn đồ vào mọi lẽ thật và rao bảo những việc sẽ đến. Ngài khẳng định Thánh Linh sẽ lấy những điều thuộc về Ngài mà rao truyền.'

w-15:
  title: 'Nỗi buồn hóa ra vui mừng'
  scripture: '16:16–33'
  summary: 'Đức Chúa Jêsus báo trước về một ít lâu các môn đồ sẽ không thấy Ngài, rồi một ít lâu nữa sẽ thấy Ngài. Ngài ví nỗi đau sắp tới của họ như người đàn bà chuyển dạ, nhưng niềm vui sau đó sẽ không ai cướp mất được. Ngài khích lệ họ hãy vững lòng vì Ngài đã thắng thế gian.'

w-16:
  title: 'Ngôi Lời thành xác thịt'
  scripture: '1:1–18'
  summary: 'Ngôi Lời có từ ban đầu với Đức Chúa Trời, là nguồn sự sáng và sự sống cho loài người. Ngôi Lời đã trở nên xác thịt, ở giữa thế gian đầy ơn và lẽ thật. Giăng làm chứng rằng qua Ngài, loài người nhận được ân điển và thấy được Đức Chúa Trời.'

w-17:
  title: 'Lời chứng của Giăng Báp-tít'
  scripture: '1:19–34'
  summary: 'Giăng Báp-tít xác nhận ông không phải là Đấng Christ nhưng là tiếng kêu trong đồng vắng dọn đường cho Chúa. Khi thấy Đức Chúa Jêsus, ông gọi Ngài là Chiên con của Đức Chúa Trời, Đấng cất tội lỗi thế gian đi. Ông làm chứng đã thấy Thánh Linh ngự xuống trên Ngài.'

w-18:
  title: 'Các môn đồ đầu tiên'
  scripture: '1:35–51'
  summary: 'Anh-rê và một môn đồ khác đi theo Đức Chúa Jêsus, sau đó Anh-rê dẫn anh mình là Phi-e-rơ đến với Ngài. Đức Chúa Jêsus gọi Phi-líp, rồi Phi-líp tìm Na-tha-na-ên để giới thiệu về Ngài. Na-tha-na-ên xưng Ngài là Con Đức Chúa Trời sau khi Ngài bày tỏ tri thức siêu nhiên về ông.'

w-19:
  title: 'Tiệc cưới tại Ca-na'
  scripture: '2:1–12'
  summary: 'Đức Chúa Jêsus cùng mẹ và môn đồ dự tiệc cưới tại Ca-na và Ngài đã hóa nước thành rượu ngon khi rượu hết. Đây là phép lạ đầu tiên Ngài làm để bày tỏ vinh hiển mình và các môn đồ tin Ngài. Sau đó, Ngài cùng gia đình và môn đồ xuống thành Ca-bê-na-um.'

w-20:
  title: 'Làm sạch đền thờ'
  scripture: '2:13–25'
  summary: 'Đức Chúa Jêsus lên Giê-ru-sa-lem, dùng roi bện bằng dây đuổi những kẻ buôn bán và đổi bạc ra khỏi đền thờ. Ngài tuyên bố hãy phá đền thờ này đi, trong ba ngày Ngài sẽ dựng lại, ý chỉ về thân thể mình. Nhiều người tin Ngài khi thấy các phép lạ, nhưng Ngài không phó thác mình cho họ vì biết lòng họ.'

w-21:
  title: 'Cuộc trò chuyện với Ni-cô-đem'
  scripture: '3:1–21'
  summary: 'Ni-cô-đem đến tìm Đức Chúa Jêsus trong ban đêm và được dạy về sự cần thiết của việc tái sinh bởi nước và Thánh Linh. Đức Chúa Jêsus phán về tình yêu của Đức Chúa Trời khi ban Con một Ngài để ai tin sẽ không bị hư mất. Ngài giải thích rằng sự sáng đã đến thế gian nhưng người ta ưa sự tối tăm hơn.'

w-22:
  title: 'Lời chứng cuối của Giăng'
  scripture: '3:22–36'
  summary: 'Môn đồ của Giăng tranh luận về sự tẩy uế và báo rằng mọi người đang tìm đến Đức Chúa Jêsus. Giăng trả lời rằng Ngài phải hề hớn, còn ông phải hạ xuống. Ông khẳng định Đấng từ trên cao xuống thì trên hết mọi loài và ai tin Con thì có sự sống đời đời.'

w-23:
  title: 'Người đàn bà Sa-ma-ri'
  scripture: '4:1–26'
  summary: 'Đức Chúa Jêsus dừng chân bên giếng Gia-cốp và xin nước uống từ một người đàn bà Sa-ma-ri. Ngài đề cập đến nước sống khiến người ta không bao giờ khát nữa và bày tỏ sự hiểu biết về đời tư của bà. Ngài xác nhận mình là Đấng Christ và dạy về sự thờ phượng bằng tâm thần và lẽ thật.'

w-24:
  title: 'Cánh đồng chín vàng'
  scripture: '4:27–42'
  summary: 'Các môn đồ ngạc nhiên khi thấy Ngài nói chuyện với người đàn bà, trong khi bà vào thành báo cho dân chúng về Ngài. Đức Chúa Jêsus dạy các môn đồ rằng đồ ăn của Ngài là làm theo ý muốn Cha và mùa gặt linh hồn đã sẵn sàng. Nhiều người Sa-ma-ri tin Ngài sau khi nghe chính lời Ngài phán.'

w-25:
  title: 'Chữa lành con quan thị vệ'
  scripture: '4:43–54'
  summary: 'Đức Chúa Jêsus trở lại Ca-na và gặp một quan thị vệ xin Ngài chữa cho con trai đang sắp chết ở Ca-bê-na-um. Ngài bảo ông hãy về vì con ông sống, và ông tin lời Ngài mà đi. Khi về đến nhà, ông xác nhận con mình lành bệnh đúng giờ Ngài phán và cả nhà ông đều tin.'

w-26:
  title: 'Người đau liệt tại Bết-ê-đa'
  scripture: '5:1–18'
  summary: 'Tại ao Bết-ê-đa, Đức Chúa Jêsus chữa lành cho một người bị liệt đã ba mươi tám năm vào ngày Sa-ba-tô. Người Giu-đa bắt lỗi người được chữa vì mang giường đi và tìm cách giết Đức Chúa Jêsus. Ngài trả lời rằng Cha Ngài làm việc cho đến bây giờ và Ngài cũng làm việc như vậy.'

w-27:
  title: 'Quyền năng của Con'
  scripture: '5:19–47'
  summary: 'Đức Chúa Jêsus khẳng định Con không tự mình làm gì được nhưng làm theo mọi việc thấy Cha làm. Ngài tuyên bố mình có quyền ban sự sống và thực thi sự phán xét. Ngài chỉ ra các chứng cớ về Ngài từ Giăng Báp-tít, từ các việc Ngài làm, từ Cha và từ Kinh Thánh.'

w-28:
  title: 'Hóa bánh cho năm ngàn người'
  scripture: '6:1–21'
  summary: 'Đức Chúa Jêsus dùng năm cái bánh mạch nha và hai con cá của một đứa trẻ để cho năm ngàn người ăn no nê. Sau khi dân chúng muốn tôn Ngài làm vua, Ngài lánh mặt lên núi một mình. Đêm đó, Ngài đi bộ trên mặt biển để đến với các môn đồ đang gặp gió ngược trong thuyền.'

w-29:
  title: 'Bánh hằng sống từ trời'
  scripture: '6:22–40'
  summary: 'Dân chúng tìm gặp Ngài bên kia biển và Ngài bảo họ hãy làm việc vì đồ ăn còn lại đến sự sống đời đời. Ngài tuyên bố chính mình là bánh của sự sống xuống từ trên trời, ai đến với Ngài sẽ không đói. Ngài khẳng định ý muốn của Cha là ai nhìn Con và tin thì được sự sống đời đời.'

w-30:
  title: 'Lời khó hiểu và sự lìa bỏ'
  scripture: '6:41–71'
  summary: 'Người Giu-đa lằm bằm khi Đức Chúa Jêsus nói Ngài là bánh từ trời xuống và phải ăn thịt cùng uống huyết Ngài mới có sự sống. Nhiều môn đồ cho là lời khó lọt tai nên đã thối lui không đi theo Ngài nữa. Phi-e-rơ đại diện nhóm mười hai khẳng định chỉ có Ngài mới có lời sự sống đời đời.'

w-31:
  title: 'Đức Chúa Jêsus tại lễ Lều tạm'
  scripture: '7:1–24'
  summary: 'Anh em Đức Chúa Jêsus giục Ngài lên dự lễ tại Giu-đê nhưng Ngài từ chối vì giờ Ngài chưa đến, sau đó Ngài đi cách kín nhiệm. Giữa kỳ lễ, Ngài vào đền thờ giảng dạy khiến mọi người ngạc nhiên về sự thông biết của Ngài. Ngài trách họ đừng xét đoán theo bề ngoài nhưng hãy xét đoán theo lẽ công bình.'

w-32:
  title: 'Nguồn nước sống'
  scripture: '7:25–52'
  summary: 'Dân chúng tranh luận về nguồn gốc của Đức Chúa Jêsus trong khi các thầy tế lễ sai lính đi bắt Ngài. Vào ngày cuối cùng của lễ, Ngài đứng dậy kêu gọi ai khát hãy đến mà uống để có sông nước sống tuôn tràn từ lòng mình. Đội lính trở về tay không vì kinh ngạc trước lời giáo huấn của Ngài.'

w-33:
  title: 'Người đàn bà ngoại tình'
  scripture: '7:53–8:11'
  summary: 'Các thầy thông giáo và người Pha-ri-si dẫn một người đàn bà bị bắt quả tang phạm tội tà dâm đến trước mặt Đức Chúa Jêsus để thử Ngài. Ngài bảo ai vô tội hãy lấy đá ném trước, khiến họ lần lượt rút lui hết. Ngài không định tội bà nhưng bảo bà đừng phạm tội nữa.'

w-34:
  title: 'Sự sáng của thế gian'
  scripture: '8:12–30'
  summary: 'Đức Chúa Jêsus tuyên bố Ngài là sự sáng của thế gian, ai theo Ngài sẽ không đi trong nơi tối tăm. Ngài làm chứng về mình cùng với Cha là Đấng đã sai Ngài đến. Ngài cảnh báo người nghe rằng nếu không tin Ngài, họ sẽ chết trong tội lỗi mình.'

w-35:
  title: 'Tự do thật và nguồn gốc của Abraham'
  scripture: '8:31–59'
  summary: 'Đức Chúa Jêsus phán rằng lẽ thật sẽ buông tha những kẻ tin Ngài, khiến họ được tự do khỏi tội lỗi. Ngài đối đáp với người Giu-đa về việc họ không phải con thật của Abraham vì tìm cách giết Ngài. Ngài khẳng định trước khi có Abraham đã có Ngài, khiến họ lấy đá định ném Ngài.'

w-36:
  title: 'Chữa lành người mù bẩm sinh'
  scripture: '9:1–23'
  summary: 'Đức Chúa Jêsus dùng bùn thoa lên mắt một người mù từ thuở mới sinh và bảo ông đi rửa tại ao Si-lô-ê để được sáng mắt. Người Pha-ri-si tra hỏi người được chữa về danh tính kẻ đã làm phép lạ vào ngày Sa-ba-tô. Cha mẹ ông sợ hãi không dám trả lời thay vì sợ bị đuổi khỏi nhà hội.'

w-37:
  title: 'Sự mù lòa thuộc linh'
  scripture: '9:24–41'
  summary: 'Người Pha-ri-si trục xuất người mù sau khi ông bênh vực Đức Chúa Jêsus là người từ Đức Chúa Trời đến. Đức Chúa Jêsus tìm gặp ông, mặc khải mình là Con Đức Chúa Trời và ông đã tin thờ Ngài. Ngài phán rằng Ngài đến để kẻ mù được thấy và kẻ thấy hóa mù.'

w-38:
  title: 'Người chăn hiền lành'
  scripture: '10:1–21'
  summary: 'Đức Chúa Jêsus ví mình là cửa của chuồng chiên và là người chăn hiền lành phó sự sống vì bầy chiên. Ngài nói chiên Ngài nghe tiếng Ngài và Ngài biết chúng. Dân chúng chia rẽ nhau, kẻ cho Ngài bị quỷ ám, người cho rằng quỷ không thể mở mắt kẻ mù.'

w-39:
  title: 'Sự hiệp nhất với Cha'
  scripture: '10:22–42'
  summary: 'Tại lễ Khánh thành đền thờ, người Giu-đa vây quanh đòi Đức Chúa Jêsus nói rõ Ngài có phải là Đấng Christ không. Ngài trả lời bằng các việc mình làm và tuyên bố Ngài với Cha là một. Họ định ném đá Ngài vì cho là lộng ngôn, nhưng Ngài lánh sang bên kia sông Giô-đanh và nhiều người tại đó đã tin Ngài.'

w-40:
  title: 'La-xa-rơ đau ốm và chết'
  scripture: '11:1–27'
  summary: 'Hay tin La-xa-rơ đau nặng, Đức Chúa Jêsus đợi thêm hai ngày rồi mới cùng môn đồ đi đến Bê-tha-ni. Khi đến nơi, La-xa-rơ đã nằm trong mộ bốn ngày. Ngài an ủi Ma-thê bằng lời hứa về sự sống lại và khẳng định chính Ngài là sự sống lại và sự sống.'

w-41:
  title: 'La-xa-rơ sống lại và mưu độc'
  scripture: '11:28–57'
  summary: 'Đức Chúa Jêsus khóc trước mộ La-xa-rơ rồi truyền lệnh kêu ông ra khỏi huyệt lúc bấy giờ đang quấn vải liệm. Chứng kiến phép lạ, nhiều người Giu-đa tin Ngài, nhưng các lãnh đạo tôn giáo lập mưu giết Ngài để bảo vệ quyền lợi chính trị. Cai-phe tiên tri rằng một người chết thay cho dân là ích lợi.'

w-42:
  title: 'Xức dầu tại Bê-tha-ni'
  scripture: '12:1–11'
  summary: 'Trong bữa tiệc tại nhà La-xa-rơ, Ma-ri lấy một bình dầu cam tùng hương thật quý xức chân Đức Chúa Jêsus và lấy tóc mình lau. Giu-đa Ích-ca-ri-ốt chỉ trích sự lãng phí này nhưng Ngài bảo hãy để yên cho bà làm vì ngày chôn cất Ngài. Nhiều người kéo đến xem cả Đức Chúa Jêsus và La-xa-rơ, khiến các thầy tế lễ định giết luôn cả La-xa-rơ.'

w-43:
  title: 'Vào thành và hạt giống lúa mì'
  scripture: '12:12–26'
  summary: 'Đức Chúa Jêsus cưỡi con lừa con vào thành Giê-ru-sa-lem giữa tiếng reo hò "Hô-sa-na" của dân chúng. Một vài người Gờ-réc tìm gặp Ngài, và Ngài phán rằng giờ tôn vinh đã đến. Ngài ví mình như hạt giống lúa mì phải chết đi mới kết quả và dạy kẻ nào phục vụ Ngài phải theo Ngài.'

w-44:
  title: 'Tiếng từ trời và sự không tin'
  scripture: '12:27–50'
  summary: 'Đức Chúa Jêsus cầu nguyện xin Cha làm vinh hiển danh Ngài và có tiếng đáp lời từ trời. Ngài cảnh báo về sự tối tăm sắp đến và kêu gọi mọi người tin vào sự sáng trong khi còn có sự sáng. Dù thấy nhiều phép lạ, dân chúng vẫn không tin để ứng nghiệm lời tiên tri Ê-sai.'

w-45:
  title: 'Lời cầu nguyện cho chính mình'
  scripture: '17:1–5'
  summary: 'Đức Chúa Jêsus ngước mắt lên trời cầu nguyện rằng giờ đã đến và xin Cha làm vinh hiển Con để Con làm vinh hiển Cha. Ngài nhắc lại quyền trị mọi xác thịt để ban sự sống đời đời cho những kẻ Cha đã giao. Ngài xin được hưởng lại vinh hiển vốn có từ trước khi sáng thế.'

w-46:
  title: 'Lời cầu nguyện cho môn đồ'
  scripture: '17:6–13'
  summary: 'Đức Chúa Jêsus cầu nguyện cho các môn đồ là những kẻ đã nhận lãnh và tin đạo Ngài. Ngài xin Cha gìn giữ họ trong danh Cha để họ được hiệp một như Ngài với Cha. Ngài nói rằng Ngài bảo vệ họ khi còn ở thế gian và nay xin cho họ có sự vui mừng trọn vẹn.'

w-47:
  title: 'Sự thánh hóa và sai đi'
  scripture: '17:14–19'
  summary: 'Đức Chúa Jêsus cầu xin Cha không phải cất môn đồ khỏi thế gian nhưng gìn giữ họ khỏi kẻ ác. Ngài xin Cha dùng lẽ thật mà thánh hóa họ vì Lời Cha là lẽ thật. Ngài tự thánh hóa mình để họ cũng được thánh hóa và sai họ vào thế gian như Cha đã sai Ngài.'

w-48:
  title: 'Lời cầu nguyện cho sự hiệp nhất'
  scripture: '17:20–23'
  summary: 'Đức Chúa Jêsus cầu nguyện cho cả những người sẽ nhờ lời các môn đồ mà tin Ngài. Ngài xin cho tất cả được hiệp làm một trong Ngài và trong Cha để thế gian tin rằng Cha đã sai Ngài đến. Ngài ban vinh hiển của mình cho họ để sự hiệp nhất này trở nên trọn vẹn.'

w-49:
  title: 'Lời cầu nguyện cho tình yêu đời đời'
  scripture: '17:24–26'
  summary: 'Đức Chúa Jêsus nguyện xin cho những kẻ thuộc về Ngài được ở cùng Ngài để thấy vinh hiển mà Cha đã ban cho Ngài từ trước buổi sáng thế. Ngài đã tỏ danh Cha cho họ và sẽ còn tỏ ra nữa. Ngài xin cho tình yêu của Cha đối với Ngài ở trong họ và chính Ngài cũng ở trong họ.'

w-50:
  title: 'Mục đích của sách Phúc âm'
  scripture: '20:30–31'
  summary: 'Đức Chúa Jêsus còn làm nhiều phép lạ khác trước mặt các môn đồ mà không chép trong sách này. Những việc này được chép lại để người đọc tin rằng Đức Chúa Jêsus là Đấng Christ, Con Đức Chúa Trời. Nhờ đức tin đó, người tin sẽ nhận được sự sống trong danh Ngài.'

w-51:
  title: 'Tổng kết các phép lạ và danh xưng'
  scripture: '1:1–21:25'
  summary: 'Sách Giăng ghi lại bảy phép lạ tiêu biểu và các lời tuyên bố "Ta là" của Đức Chúa Jêsus để bày tỏ thần tính của Ngài. Từ việc hóa rượu tại Ca-na đến việc gọi La-xa-rơ sống lại, các dấu lạ chứng minh Ngài là Đấng ban sự sống. Toàn bộ sách tập trung vào việc mặc khải vinh hiển của Đức Chúa Trời qua Con một Ngài.'

w-52:
  title: 'Đại mạng lệnh và sự phục hồi cuối cùng'
  scripture: '21:15–25'
  summary: 'Sau khi phục hồi Phi-e-rơ bên bờ biển, Đức Chúa Jêsus tái khẳng định lời kêu gọi các môn đồ hãy bước theo Ngài. Sự phục sinh của Ngài biến đổi nỗi sợ hãi của họ thành sự dạn dĩ để làm chứng nhân cho đến tận cùng trái đất. Sứ điệp cuối cùng là sự sống đời đời và hy vọng trong Đấng đã đắc thắng thế gian.'
